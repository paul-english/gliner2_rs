name: Publish to crates.io
on:
  push:
    tags: ['v*']  # Triggers when pushing tags starting with 'v'
jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release  # Optional: for enhanced security
    permissions:
      id-token: write     # Required for OIDC token exchange
    steps:
    - uses: actions/checkout@v6
    - uses: rust-lang/crates-io-auth-action@v1
      id: auth

    # Publish gliner2 first (library + launcher binary)
    - name: Publish gliner2
      run: cargo publish -p gliner2
      env:
        CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

    # Wait for crates.io index to propagate
    - name: Wait for index
      run: sleep 30

    # Publish gliner2-tch (depends on published gliner2)
    - name: Publish gliner2-tch
      run: cargo publish -p gliner2-tch
      env:
        CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
