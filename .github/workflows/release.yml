# Build release binaries and upload to GitHub Releases.
# Triggered on tag push (v*).
# LibTorch is NOT bundled — users run `gliner2 setup` to download their variant.

name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # TODO build candle, build tch + {cu variants, cpu, rocm}
      # TORCH_CUDA_VERSION=cu118,cu121,cu124,cu126,cu128
      - name: Build gliner2
        run: cargo build --release -p gliner2 --target ${{ matrix.target }}

      - name: Package tarball
        run: |
          mkdir -p dist/bin
          cp target/${{ matrix.target }}/release/gliner2 dist/bin/
          tar -czf gliner2-${{ matrix.target }}.tar.gz -C dist .

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: gliner2-${{ matrix.target }}.tar.gz
