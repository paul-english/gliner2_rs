[package]
name = "gliner2"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "Rust implementation of GLiNER2 with compatibility for upstream weights and Python training output."
license = "Apache-2.0"
readme = "README.md"
repository = "https://github.com/paul-english/gliner2_rs"
default-run = "gliner2"
include = [
    "/Cargo.toml",
    "/Cargo.lock",
    "/LICENSE",
    "/README.md",
    "/src/*.rs",
]

[workspace]
members = ["harness_compare", "scripts/list_keys"]
resolver = "2"

[dependencies]
candle-core = "0.8"
candle-nn = "0.8"
candle-transformers = "0.8"
hf-hub = "0.4"
tokenizers = "0.21"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
regex = "1"
tracing = "0.1"
tracing-subscriber = "0.3"
